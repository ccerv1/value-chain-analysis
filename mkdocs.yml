site_name: "Value Chain Analysis"
site_description: "Course materials for Value Chain Analysis at Columbia SIPA"
site_url: "https://ccerv1.github.io/value-chain-analysis/"

docs_dir: site
site_dir: _site

theme:
  name: material
  palette:
    - scheme: default
      primary: black
      accent: black
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: black
      accent: white
      toggle:
        icon: material/brightness-4
        name: Light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight

nav:
  - Course Materials:
    - Introduction: index.md
    - Coffee 101: lecture-notes/coffee-value-chain.md
    - The VCA Framework:
      - Mapping Value Chain Actors: skills/01-mapping-a-value-chain.md
      - Breaking Down Value Flows: skills/02-breaking-down-value-flows.md
      - Dealing with Unit Conversions: skills/03-unit-conversion-and-price-analysis.md
      - Benchmarking: skills/04-benchmarking.md
      - Formulating Recommendations: skills/05-prioritizing-recommendations.md
    - Case Studies:
      - Overview: case-studies/README.md
      - Vietnam: case-studies/vietnam.md
      - Rwanda: case-studies/rwanda.md
      - Honduras: case-studies/honduras.md
      - Colombia: case-studies/colombia.md
      - Ethiopia: case-studies/ethiopia.md
    - Practical Tips: lecture-notes/practical-tips.md
  - Additional Resources:
    - Past Lectures: lectures/README.md
    - Skills Guides: skills/README.md
    - Data & Scripts: scripts/README.md
    - Further Reading: reading-list/README.md

exclude_docs: |
  .venv/
  _site/
  data/raw/
  data/processed/*.csv
  data/exercises/
  scripts/*.py
  lectures/**/*.pptx
  lectures/**/*.xlsx
  lectures/**/*.docx
  reading-list/**/*.pdf
  reading-list/**/*.doc
  reading-list/**/*.docx
  reading-list/**/*.ppt
  photos/README.md
  lecture-notes/README.md
  lecture-notes/ethiopian-cherry-to-nyc-cup.md
  lecture-notes/why-vca.md
  lecture-notes/value-chain-analysis.md
  *.toml
  *.lock
  .python-version
  .gitignore
  .DS_Store

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - stylesheets/custom.css

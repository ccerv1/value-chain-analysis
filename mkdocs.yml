site_name: "Value Chain Analysis"
site_description: "Course materials for Value Chain Analysis at Columbia SIPA"
site_author: "Carl Cervone"
site_url: "https://ccerv1.github.io/value-chain-analysis/"

docs_dir: site
site_dir: _site

theme:
  name: material
  palette:
    - scheme: default
      primary: black
      accent: black
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: white
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight

# Student-facing navigation only
nav:
  - Home: README.md
  - Lecture Notes:
    - Overview: lecture-notes/README.md
    - "The Coffee Value Chain: Cherry to Cup": lecture-notes/coffee-value-chain.md
    - "From Ethiopian Cherry to NYC Cup": lecture-notes/ethiopian-cherry-to-nyc-cup.md
    - Value Chain Analysis: lecture-notes/value-chain-analysis.md
  - Skills Guides:
    - Overview: skills/README.md
    - "1. Mapping a Value Chain": skills/01-mapping-a-value-chain.md
    - "2. Breaking Down Value Flows": skills/02-breaking-down-value-flows.md
    - "3. Unit Conversion & Price Analysis": skills/03-unit-conversion-and-price-analysis.md
    - "4. Benchmarking": skills/04-benchmarking.md
    - "5. Prioritizing Recommendations": skills/05-prioritizing-recommendations.md
    - "6. Conducting a Deep Dive": skills/06-conducting-a-value-chain-deep-dive.md
  - Case Studies:
    - Overview: case-studies/README.md
    - Vietnam: case-studies/vietnam.md
    - Rwanda: case-studies/rwanda.md
    - Honduras: case-studies/honduras.md
    - Colombia (archival): case-studies/colombia.md
    - Ethiopia (archival): case-studies/ethiopia.md
  - Slides: lectures/README.md
  - Data: data/README.md
  - Reading List: reading-list/README.md
  - Photos: photos/README.md
  - Developer:
    - Scripts: scripts/README.md
    - Data Schemas: data/README.md

exclude_docs: |
  .venv/
  _site/
  data/raw/
  data/processed/*.csv
  data/exercises/
  scripts/*.py
  lectures/**/*.pptx
  lectures/**/*.xlsx
  lectures/**/*.docx
  reading-list/**/*.pdf
  reading-list/**/*.doc
  reading-list/**/*.docx
  reading-list/**/*.ppt
  *.toml
  *.lock
  .python-version
  .gitignore
  .DS_Store

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - stylesheets/custom.css
